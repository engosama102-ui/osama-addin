<!doctype html><html><head><meta charset="UTF-8"/><title>Osama Add-in</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f4f4f7;font-size:13px;color:#333}.header{background:#1e1e2e;padding:12px 16px;border-bottom:2px solid #7c8dfc}.header-title{font-weight:800;font-size:14px;color:#7c8dfc;letter-spacing:1px}.content{padding:10px}.section{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 2px 4px rgba(0,0,0,.05)}.section-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:4px}.row{display:flex;align-items:center;gap:8px;margin-top:8px}.row label{font-size:11px;color:#555;min-width:75px}.row input[type=range]{flex:1;cursor:pointer}.row span.val{font-size:11px;min-width:30px;text-align:right;font-weight:700;color:#7c8dfc}.row input[type=color]{width:34px;height:28px;border:1px solid #ddd;border-radius:4px;cursor:pointer;padding:1px;background:0 0}.row input[type=text]{flex:1;border:1px solid #ddd;border-radius:4px;padding:4px 6px;font-size:11px;font-family:monospace}button{padding:7px 10px;font-size:11px;cursor:pointer;border:1px solid #ddd;border-radius:6px;background:#fff;transition:.2s}button:hover{background:#f0f0f0;border-color:#ccc}.btn-blue{background:#7c8dfc;color:#fff;border:none;width:100%;padding:10px;font-weight:700;margin-top:8px}.btn-blue:hover{background:#6a7ae0}.btn-red{background:#ff4d4d;color:#fff;border:none;padding:5px 10px}.btn-green{background:#2ecc71;color:#fff;border:none}.btn-full{width:100%;margin-top:8px;font-weight:600}.shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}.shape-item{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;padding:4px;position:relative}.shape-item svg{width:24px;height:24px}.shape-item span{font-size:8px;color:#999;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}.del-btn{position:absolute;top:-5px;right:-5px;background:#ff4d4d;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:none;align-items:center;justify-content:center}.shape-item:hover .del-btn{display:flex}textarea{width:100%;height:60px;font-size:11px;font-family:monospace;border:1px solid #ddd;border-radius:6px;padding:8px;resize:none;background:#fafafa}.hint{font-size:10px;color:#999;margin-top:6px;font-style:italic}#status{position:fixed;bottom:10px;left:10px;right:10px;font-size:11px;padding:8px;border-radius:6px;display:none;z-index:100;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.1)}#status.ok{display:block;background:#d4edda;color:#155724;border:1px solid #c3e6cb}#status.err{display:block;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}</style><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div class="header"><div class="header-title">OSAMA DESIGN TOOLS</div></div><div class="content"><div class="section"><div class="section-title">Shape Fill</div><div class="row"><label>Color</label> <input type="color" id="fillColor" value="#4472C4" oninput="onFillColorInput(this.value)"> <input id="fillHex" value="#4472C4" oninput="syncFillHexInput()"></div><div class="row"><label>Opacity</label> <input type="range" id="opacitySlider" min="0" max="100" value="100" oninput='document.getElementById("opacityVal").textContent=this.value,applyOpacity(this.value)'> <span class="val" id="opacityVal">100</span></div><button class="btn-red btn-full" onclick="applyNoFill()">Set No Fill</button></div><div class="section"><div class="section-title">Shape Border</div><div class="row"><label>Color</label> <input type="color" id="borderColor" value="#000000" oninput="applyBorderColor(this.value)"> <input id="borderHex" value="#000000" oninput="syncBorderHexInput()"></div><div class="row"><label>Width (pt)</label> <input type="range" id="borderSlider" min="0" max="20" step="0.5" value="1" oninput='document.getElementById("borderVal").textContent=this.value,applyBorderWidth(this.value)'> <span class="val" id="borderVal">1</span></div></div><div class="section"><div class="section-title">Corner Settings</div><button class="btn-blue btn-full" style="margin-bottom:12px" onclick="convertToRoundRect()">1. Convert to Round Rectangle</button><div class="row"><label>Radius (pt)</label> <input type="range" id="radiusSlider" min="0" max="100" value="10" oninput='document.getElementById("radiusVal").textContent=this.value,applyCornerRadius(this.value)'> <span class="val" id="radiusVal">10</span></div><div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><button onclick='applyCornerRadius(document.getElementById("radiusSlider").value)'>Apply Selected</button> <button class="btn-green" onclick='applyCornerRadiusToAll(document.getElementById("radiusSlider").value)'>Apply to All</button></div><div class="hint">Note: You must convert standard rectangles first.</div></div><div class="section"><div class="section-title">SVG Assets</div><textarea id="svg-input" placeholder="Paste <svg> code here..."></textarea><div class="row"><input id="svgName" placeholder="Asset Name"> <button onclick="addSVGToLibrary()">Save</button> <button class="btn-green" onclick="insertSVGToSlide()">Insert</button></div><div class="shape-grid" id="svgLibraryGrid"></div><div class="hint">Saved SVGs are stored locally in your browser.</div></div><div class="section"><div class="section-title">Bulk Color Swapper</div><div class="row"><label>Find</label> <input type="color" id="findColor" value="#4472C4"> <label style="min-width:50px;text-align:right">Replace</label> <input type="color" id="replaceColor" value="#ff0000"></div><button class="btn-blue" onclick="bulkColorReplace()">Replace All on Current Slide</button></div></div><div id="status"></div><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script src="3ebbc88ffc64072cbe28.js"></script></body></html>
