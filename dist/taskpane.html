<!doctype html><html><head><meta charset="UTF-8"/><title>Osama Design Tools</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f4f4f7;font-size:13px;color:#333}.header{background:#1e1e2e;padding:12px;border-bottom:2px solid #7c8dfc;text-align:center}.header-title{font-weight:800;color:#7c8dfc;letter-spacing:1px}.content{padding:10px}.section{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 2px 4px rgba(0,0,0,.05)}.section-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:4px}.row{display:flex;align-items:center;gap:8px;margin-top:8px}.row label{font-size:11px;color:#555;min-width:75px}.row input[type=range]{flex:1;cursor:pointer}.row span.val{font-size:11px;min-width:30px;text-align:right;font-weight:700;color:#7c8dfc}.row input[type=color]{width:34px;height:28px;border:1px solid #ddd;border-radius:4px;cursor:pointer}.row input[type=text]{flex:1;border:1px solid #ddd;border-radius:4px;padding:4px 6px;font-size:11px}button{padding:8px;font-size:11px;cursor:pointer;border:1px solid #ddd;border-radius:6px;background:#fff;width:100%;margin-top:5px;transition:.2s}button:hover{background:#f0f0f0}.btn-blue{background:#7c8dfc;color:#fff;border:none;font-weight:700;padding:10px}.btn-green{background:#2ecc71;color:#fff;border:none}.btn-red{background:#ff4d4d;color:#fff;border:none}.hint{font-size:10px;color:#999;margin-top:6px;font-style:italic}#status{position:fixed;bottom:10px;left:10px;right:10px;font-size:11px;padding:8px;border-radius:6px;display:none;text-align:center}#status.ok{display:block;background:#d4edda;color:#155724}#status.err{display:block;background:#f8d7da;color:#721c24}</style><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div class="header"><div class="header-title">OSAMA DESIGN TOOLS</div></div><div class="content"><div class="section"><div class="section-title">Shape Fill</div><div class="row"><label>Color</label> <input type="color" id="fillColor" value="#4472C4" oninput="onFillColorInput(this.value)"> <input id="fillHex" value="#4472C4" oninput="syncFillHexInput()"></div><div class="row"><label>Opacity</label> <input type="range" id="opacitySlider" min="0" max="100" value="100" oninput='document.getElementById("opacityVal").textContent=this.value,applyOpacity(this.value)'> <span class="val" id="opacityVal">100</span></div><button class="btn-red" onclick="applyNoFill()">Set No Fill</button></div><div class="section"><div class="section-title">Shape Border</div><div class="row"><label>Color</label> <input type="color" id="borderColor" value="#000000" oninput="applyBorderColor(this.value)"> <input id="borderHex" value="#000000" oninput="syncBorderHexInput()"></div><div class="row"><label>Width (pt)</label> <input type="range" id="borderSlider" min="0" max="20" step="0.5" value="1" oninput='document.getElementById("borderVal").textContent=this.value,applyBorderWidth(this.value)'> <span class="val" id="borderVal">1</span></div></div><div class="section"><div class="section-title">Corner Settings</div><button class="btn-blue" onclick="convertToRoundRect()">1. Convert to Round Rectangle</button><div class="row"><label>Radius (pt)</label> <input type="range" id="radiusSlider" min="0" max="100" value="10" oninput='document.getElementById("radiusVal").textContent=this.value,applyCornerRadius(this.value)'> <span class="val" id="radiusVal">10</span></div><button class="btn-green" onclick='applyCornerRadiusToAll(document.getElementById("radiusSlider").value)'>Apply Radius to All Shapes</button><div class="hint">Slider works only on Round Rectangles.</div></div></div><div id="status"></div><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script src="47af8d4bf2e3604cdb8a.js"></script></body></html>
